<div class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/40 backdrop-blur-sm p-4 animate-fade-in">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-md overflow-hidden relative"
        (click)="$event.stopPropagation()">

        <!-- Success Animation State -->
        @if (success()) {
        <div class="p-12 flex flex-col items-center justify-center text-center animate-fade-in-up">
            <!-- Animated Checkmark Circle -->
            <div class="w-24 h-24 rounded-full bg-emerald-100 flex items-center justify-center mb-6 relative">
                <div
                    class="absolute inset-0 rounded-full border-4 border-emerald-500 border-t-transparent animate-spin-slow opacity-10">
                </div>

                <!-- Outer Ping -->
                <div class="absolute inset-0 rounded-full bg-emerald-400 animate-ping opacity-20"></div>

                <!-- Inner Base -->
                <div
                    class="w-16 h-16 rounded-full bg-emerald-500 flex items-center justify-center shadow-[0_0_20px_rgba(16,185,129,0.4)] relative z-10 transform scale-0 animate-pop-in">
                    <!-- Draw Checkmark Path -->
                    <svg class="w-8 h-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"
                            class="animate-dash" stroke-dasharray="24" stroke-dashoffset="24" />
                    </svg>
                </div>
            </div>

            <h3 class="text-2xl font-display font-bold text-slate-900 mb-2">Payment Successful!</h3>
            <p class="text-slate-500 mb-2">Your transaction of <span class="font-bold text-emerald-600">${{ amount |
                    number:'1.2-2' }}</span> is complete.</p>
            <p class="text-[11px] font-bold text-slate-400 uppercase tracking-widest mt-4">Activating Policy...</p>

            <!-- Loading bar underneath -->
            <div class="w-48 h-1.5 bg-slate-100 rounded-full mt-4 overflow-hidden relative">
                <div class="absolute top-0 left-0 bg-emerald-500 h-full rounded-full animate-progress-bar"></div>
            </div>
        </div>
        } @else {
        <!-- Standard Checkout Header -->
        <div class="px-6 py-5 border-b border-slate-100 flex items-center justify-between bg-slate-50">
            <div>
                <h2 class="text-lg font-bold text-slate-900 leading-tight">Secure Checkout</h2>
                <p class="text-xs font-bold text-slate-500 uppercase tracking-wider">{{ planName }}</p>
            </div>
            <button type="button" (click)="onCancel()"
                class="p-2 text-slate-400 hover:text-slate-600 hover:bg-slate-200 rounded-full transition-colors focus:outline-none"
                [disabled]="processing()">
                <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>

        <!-- Payment Form -->
        <div class="p-6">
            <div class="flex items-center justify-between mb-6 p-4 rounded-xl bg-sky-50 border border-sky-100">
                <span class="text-sm font-bold text-sky-900 uppercase tracking-wide">Total Amount</span>
                <span class="text-2xl font-black text-sky-700">${{ amount | number:'1.2-2' }}</span>
            </div>

            <form [formGroup]="paymentForm" (ngSubmit)="onSubmit()" class="space-y-4">
                <!-- Card Holder -->
                <div>
                    <label class="block text-xs font-bold text-slate-600 uppercase tracking-widest mb-1.5">Name on
                        Card</label>
                    <input type="text" formControlName="cardHolder"
                        class="w-full px-4 py-2.5 rounded-lg border border-slate-200 focus:border-sky-500 focus:ring-2 focus:ring-sky-500/20 transition-all font-medium text-slate-900 placeholder:text-slate-400"
                        placeholder="JOHN DOE" />
                </div>

                <!-- Card Number -->
                <div>
                    <label
                        class="block text-xs font-bold text-slate-600 uppercase tracking-widest mb-1.5 flex justify-between">
                        Card Number
                        <div class="flex gap-1">
                            <svg class="w-5" viewBox="0 0 32 20" fill="none">
                                <rect width="32" height="20" rx="3" fill="#1A1F71" />
                                <path
                                    d="M11.666 4H8.434L6.963 15.65h3.232l1.47-11.65zm16.966 0h-2.531c-.604 0-1.077.29-1.32.86l-4.5 10.79h3.401l.681-1.931h4.15l.394 1.931h3.01l-3.285-11.65zm-2.186 6.848l1.042-2.903.626 2.903h-1.668zm-11.233-6.83l-3.327 7.915-.357-1.841c-.496-1.594-2.071-3.323-3.83-4.22l2.484 9.796h3.407L18.62 4h-3.407z"
                                    fill="#FFF" />
                                <path
                                    d="M7.749 4C6.545 4 4.545 4.567 3.515 5.25L4.85 10.518C4.85 10.518 6.516 4 7.749 4z"
                                    fill="#F79E1B" />
                            </svg>
                            <svg class="w-5" viewBox="0 0 32 20" fill="none">
                                <rect width="32" height="20" rx="3" fill="#E61C24" />
                                <circle cx="11.5" cy="10" r="6" fill="#F9A021" />
                                <path
                                    d="M16 14.15A6.02 6.02 0 0017.5 10a6.02 6.02 0 00-1.5-4.15 6.02 6.02 0 00-1.5 4.15c0 1.638.648 3.125 1.5 4.15z"
                                    fill="#FF5F00" />
                            </svg>
                        </div>
                    </label>
                    <input type="text" formControlName="cardNumber" (input)="formatCardNumber($event)"
                        class="w-full px-4 py-2.5 rounded-lg border border-slate-200 focus:border-sky-500 focus:ring-2 focus:ring-sky-500/20 transition-all font-mono text-slate-900 tracking-widest placeholder:text-slate-400"
                        placeholder="•••• •••• •••• ••••" maxlength="19" />
                </div>

                <!-- Expiry & CVV inline -->
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label
                            class="block text-xs font-bold text-slate-600 uppercase tracking-widest mb-1.5">Expires</label>
                        <input type="text" formControlName="expiry" (input)="formatExpiry($event)"
                            class="w-full px-4 py-2.5 rounded-lg border border-slate-200 focus:border-sky-500 focus:ring-2 focus:ring-sky-500/20 transition-all font-mono text-slate-900 tracking-widest text-center placeholder:text-slate-400"
                            placeholder="MM/YY" maxlength="5" />
                    </div>
                    <div>
                        <label
                            class="block text-xs font-bold text-slate-600 uppercase tracking-widest mb-1.5">CVV</label>
                        <input type="password" formControlName="cvv"
                            class="w-full px-4 py-2.5 rounded-lg border border-slate-200 focus:border-sky-500 focus:ring-2 focus:ring-sky-500/20 transition-all font-mono text-slate-900 tracking-widest text-center placeholder:text-slate-400"
                            placeholder="•••" maxlength="3" />
                    </div>
                </div>

                <div class="mt-6">
                    <button type="submit" [disabled]="paymentForm.invalid || processing()"
                        class="w-full relative overflow-hidden flex justify-center items-center py-3.5 rounded-xl text-white font-bold text-base transition-all duration-300 disabled:opacity-50 disabled:cursor-not-allowed shadow-[0_8px_20px_rgba(2,132,199,0.3)] bg-green-500 hover:from-sky-400 hover:to-blue-600 outline-none focus:ring-4 focus:ring-sky-500/30">
                        @if (processing()) {
                        <svg class="animate-spin -ml-1 mr-2 h-5 w-5 text-white" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"
                                fill="none"></circle>
                            <path class="opacity-75" fill="currentColor"
                                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                            </path>
                        </svg>
                        Processing...
                        } @else {
                        <svg class="w-5 h-5 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                            stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                        </svg>
                        Pay ${{ amount | number:'1.2-2' }}
                        }
                    </button>
                    <p
                        class="text-[10px] text-center font-bold text-slate-400 uppercase tracking-widest mt-3 flex justify-center items-center gap-1">
                        <svg class="w-3 h-3 text-slate-300" fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd"
                                d="M2.166 4.999A11.954 11.954 0 0010 1.944 11.954 11.954 0 0017.834 5c.11.65.166 1.32.166 2.001 0 5.225-3.34 9.67-8 11.317C5.34 16.67 2 12.225 2 7c0-.682.057-1.35.166-2.001zm11.541 3.708a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z"
                                clip-rule="evenodd"></path>
                        </svg>
                        Encrypted transaction
                    </p>
                </div>
            </form>
        </div>
        }
    </div>
</div>
